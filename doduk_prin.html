<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도덕 마을 디펜스: 마법 검사법의 결투 🧙‍♂️</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #2c3e50;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .villain-box {
            background-color: #e74c3c;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 3px solid #c0392b;
            position: relative;
        }
        .villain-box::after {
            content: "😈 빌런의 변명";
            position: absolute;
            top: -15px;
            left: 20px;
            background: #c0392b;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        #villain-text {
            font-size: 1.3em;
            font-weight: bold;
            margin-top: 10px;
        }
        .magic-container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 15px;
        }
        .magic-btn {
            flex: 1;
            padding: 20px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-universal {
            background-color: #3498db;
            color: white;
            box-shadow: 0 5px 0 #2980b9;
        }
        .btn-role {
            background-color: #9b59b6;
            color: white;
            box-shadow: 0 5px 0 #8e44ad;
        }
        .magic-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0;
        }
        .magic-btn:hover {
            filter: brightness(1.1);
        }
        .btn-desc {
            font-size: 0.8em;
            font-weight: normal;
            display: block;
            margin-top: 5px;
            opacity: 0.9;
        }
        #feedback-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #ecf0f1;
            color: #2c3e50;
            font-size: 1.1em;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }
        .next-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
        }
        .next-btn:hover { background-color: #27ae60; }
        #progress {
            margin-bottom: 15px;
            color: #bdc3c7;
            font-size: 1.1em;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🧙‍♂️ 도덕원리 마법 검사법</h1>
    <div id="progress">스테이지 <span id="current-stage">1</span> / 5</div>
    
    <div id="game-area">
        <div class="villain-box">
            <div id="villain-text">"나 하나쯤 급하니까 급식 줄에서 새치기해도 괜찮아!"</div>
        </div>

        <p>어떤 마법으로 이 생각의 잘못된 점을 깨닫게 할까요?</p>

        <div class="magic-container" id="btn-group">
            <button class="magic-btn btn-universal" onclick="checkAnswer('universal')">
                🌐 보편화 결과 마법
                <span class="btn-desc">"모든 사람이 그렇게 한다면?"</span>
            </button>
            <button class="magic-btn btn-role" onclick="checkAnswer('role')">
                🔄 역할 교환 마법
                <span class="btn-desc">"입장을 바꿔서 생각한다면?"</span>
            </button>
        </div>

        <div id="feedback-box">
            <div id="feedback-msg"></div>
            <button class="next-btn" onclick="nextStage()" id="next-btn-ui" style="display: none;">다음 빌런 물리치기 ➔</button>
        </div>
    </div>

    <div id="result-area" style="display:none;">
        <h2 style="color: #2ecc71; font-size: 2em;">🎉 마을의 평화를 지켰습니다!</h2>
        <p style="font-size: 1.2em; line-height: 1.6;">
            여러분은 훌륭한 도덕 마법사입니다.<br><br>
            🌐 <b>보편화 결과 검사법:</b> 모든 사람이 그렇게 행동했을 때 일어날 결과를 상상하는 것!<br>
            🔄 <b>역할 교환 검사법:</b> 입장을 바꿔서 내가 그 일을 당한다면 어떨지 상상하는 것!
        </p>
        <button class="next-btn" style="font-size: 1.2em; padding: 15px 30px;" onclick="location.reload()">다시 방어하기</button>
    </div>
</div>

<script>
    const stages = [
        {
            villain: "나 하나쯤 밥을 빨리 먹고 싶으니까, 급식 줄에서 슬쩍 새치기해도 괜찮아!",
            correct: "universal",
            explanation: "정답입니다! 🌐 보편화 결과 마법 공격 성공!<br><br><b>'전교생이 모두 밥을 빨리 먹겠다고 새치기를 한다면?'</b> 급식실은 완전히 아수라장이 되고 아무도 밥을 제때 먹을 수 없게 됩니다. 따라서 새치기를 해도 된다는 원리는 잘못되었습니다."
        },
        {
            villain: "친구의 새로운 머리 모양이 웃겨서 계속 놀리는 건, 그냥 재밌는 장난이니까 괜찮아!",
            correct: "role",
            explanation: "정답입니다! 🔄 역할 교환 마법 공격 성공!<br><br><b>'네가 미용실에서 머리를 망쳤는데 친구들이 하루 종일 널 놀린다면?'</b> 기분이 아주 나쁘겠죠? 입장을 바꿔보면 남을 놀려도 된다는 원리가 잘못되었음을 쉽게 알 수 있습니다."
        },
        {
            villain: "주머니에 있던 작은 사탕 껍질 하나쯤은 길거리에 그냥 버려도 괜찮아. 이 작은 걸로 세상이 더러워지진 않잖아?",
            correct: "universal",
            explanation: "정답입니다! 🌐 보편화 결과 마법 공격 성공!<br><br><b>'대한민국 5천만 국민이 모두 사탕 껍질을 길에 버린다면?'</b> 거리는 쓰레기 산으로 변할 것입니다. 사소해 보이지만 모든 사람이 한다고 가정하면 문제점이 확실히 드러납니다."
        },
        {
            villain: "형(또는 누나)이 아끼는 물건을 몰래 쓰고 제자리에 몰래 돌려놓으면 괜찮아. 모를 거 아니야?",
            correct: "role",
            explanation: "정답입니다! 🔄 역할 교환 마법 공격 성공!<br><br><b>'누군가 네가 가장 아끼고 소중히 여기는 물건을 허락도 없이 마음대로 가져다 쓴다면?'</b> 아마 굉장히 화가 날 것입니다. 타인의 물건을 소중히 다뤄야 함을 역지사지로 깨닫게 합니다."
        },
        {
            villain: "거짓말은 나쁘다고 하지만, 내가 숙제를 안 해서 혼날 위기일 때는 잠깐 거짓말을 해서 피해도 괜찮아!",
            correct: "universal",
            explanation: "정답입니다! 🌐 보편화 결과 마법 공격 성공!<br><br><b>'모든 사람들이 자기가 불리할 때마다 거짓말을 한다면?'</b> 우리는 가족, 친구, 선생님 그 누구의 말도 믿을 수 없게 될 것입니다. 사회의 신뢰가 무너지게 되므로 잘못된 도덕원리입니다."
        }
    ];

    let currentStage = 0;

    function loadStage() {
        document.getElementById('villain-text').innerText = `"${stages[currentStage].villain}"`;
        document.getElementById('current-stage').innerText = currentStage + 1;
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('btn-group').style.display = 'flex';
        document.getElementById('next-btn-ui').style.display = 'none';
    }

    function checkAnswer(selectedMagic) {
        const stageData = stages[currentStage];
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackMsg = document.getElementById('feedback-msg');
        
        feedbackBox.style.display = 'block';
        document.getElementById('btn-group').style.display = 'none'; // 버튼 숨김

        if (selectedMagic === stageData.correct) {
            feedbackMsg.innerHTML = `<span style="color: #27ae60; font-size: 1.2em;">✨ 효과는 굉장했다!</span><br><br>${stageData.explanation}`;
            document.getElementById('next-btn-ui').style.display = 'inline-block';
        } else {
            let hint = selectedMagic === 'universal' 
                ? "보편화 결과 검사보다는 다른 사람의 입장에서 감정을 느껴보게 하는 것이 이 변명을 깨는데 더 확실합니다!" 
                : "역할 교환 검사도 좋지만, 이 변명은 '모든 사람이 이 행동을 똑같이 한다고 상상'했을 때 발생하는 끔찍한 결과를 보여주는 것이 더 효과적입니다!";
                
            feedbackMsg.innerHTML = `<span style="color: #e74c3c; font-size: 1.2em;">💦 공격이 빗나갔다! (효과가 부족합니다)</span><br><br>${hint}<br><br><button class="next-btn" style="background-color: #f39c12;" onclick="retryStage()">다른 마법 선택하기</button>`;
        }
    }

    function retryStage() {
        document.getElementById('feedback-box').style.display = 'none';
        document.getElementById('btn-group').style.display = 'flex';
    }

    function nextStage() {
        currentStage++;
        if (currentStage < stages.length) {
            loadStage();
        } else {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
        }
    }

    // 초기 로드
    window.onload = loadStage;
</script>

</body>
</html>
